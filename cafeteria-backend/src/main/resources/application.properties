spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:cafeteriadb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

server.port=${PORT:8080}
server.servlet.context-path=/api

logging.level.root=INFO
logging.level.com.cafeteria=DEBUG

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
